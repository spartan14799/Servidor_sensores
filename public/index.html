<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centro de Monitoreo IoT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-light">
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-3 col-lg-2 d-md-block bg-dark sidebar text-white collapse min-vh-100 p-3">
        <h4 class="text-center py-3 border-bottom border-secondary"><i class="bi bi-cpu"></i> Servidor IoT</h4>
        <ul class="nav flex-column mt-4">
          <li class="nav-item mb-2">
            <button class="btn btn-outline-light w-100 text-start" onclick="cambiarVista('vista-sensores')">
              <i class="bi bi-graph-up me-2"></i> Sensores
            </button>
          </li>
        </ul>
      </nav>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
        <section id="vista-sensores" class="vista activa py-4">
          <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">Panel de Sensores</h1>
          </div>

          <div class="card shadow-sm mb-4">
            <div class="card-body bg-white rounded">
              <div class="row g-3 align-items-end">
                <div class="col-md-3">
                  <label class="form-label text-muted">Dispositivo</label>
                  <select class="form-select" id="selectorDispositivo"></select>
                </div>
                <div class="col-md-3">
                  <label class="form-label text-muted">Sensor</label>
                  <select class="form-select" id="selectorSensor"></select>
                </div>
                <div class="col-md-3">
                  <label class="form-label text-muted">Medida</label>
                  <select class="form-select" id="selectorMedida"></select>
                </div>
                <div class="col-md-3">
                  <label class="form-label text-muted">Fecha</label>
                  <input type="date" class="form-control" id="fechaFiltro" />
                </div>
              </div>
            </div>
          </div>

          <div class="row" id="contenedor-graficas-dinamico"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
   <script src="js/graficas/registro.js"></script>
<script src="js/graficas/pulsacion.js"></script>
<script src="js/graficas/luminosidad.js"></script>
<script src="js/graficas/default.js"></script>
<script src="js/app.js"></script>
</body>
</html>
