<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centro de Monitoreo IoT</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-light">

  <div class="container-fluid">
    <div class="row">
      
      <nav class="col-md-3 col-lg-2 d-md-block bg-dark sidebar text-white collapse min-vh-100 p-3">
        <div class="position-sticky">
          <h4 class="text-center py-3 border-bottom border-secondary">
            <i class="bi bi-cpu"></i> Servidor IoT
          </h4>
          <ul class="nav flex-column mt-4">
            <li class="nav-item mb-2">
              <button class="btn btn-outline-light w-100 text-start" onclick="cambiarVista('vista-rendimiento')">
                <i class="bi bi-speedometer2 me-2"></i> Rendimiento Pi
              </button>
            </li>
            <li class="nav-item">
              <button class="btn btn-outline-light w-100 text-start" onclick="cambiarVista('vista-sensores')">
                <i class="bi bi-activity me-2"></i> Datos Sensores
              </button>
            </li>
          </ul>
        </div>
      </nav>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
        
        <section id="vista-rendimiento" class="vista d-none">
          <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
            <h1 class="h2">Monitoreo del Sistema (Raspberry Pi)</h1>
          </div>
          
          <div class="row">
            <div class="col-md-4 mb-3">
              <div class="card text-white bg-primary shadow-sm">
                <div class="card-body">
                  <h5 class="card-title"><i class="bi bi-cpu"></i> Uso de CPU</h5>
                  <h2 class="card-text">45%</h2>
                </div>
              </div>
            </div>
            <div class="col-md-4 mb-3">
              <div class="card text-white bg-success shadow-sm">
                <div class="card-body">
                  <h5 class="card-title"><i class="bi bi-memory"></i> Memoria RAM</h5>
                  <h2 class="card-text">1.2 GB / 4 GB</h2>
                </div>
              </div>
            </div>
            <div class="col-md-4 mb-3">
              <div class="card text-white bg-danger shadow-sm">
                <div class="card-body">
                  <h5 class="card-title"><i class="bi bi-thermometer-half"></i> Temperatura</h5>
                  <h2 class="card-text">55°C</h2>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section id="vista-sensores" class="vista activa">
          <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
            <h1 class="h2">Monitoreo de Sensores</h1>
          </div>

          <div class="card shadow-sm mb-4">
            <div class="card-body bg-white rounded">
              <div class="row g-3 align-items-end">
                <div class="col-md-3">
                  <label for="selectorDispositivo" class="form-label text-muted">Dispositivo (IP/Nodo)</label>
                  <select class="form-select" id="selectorDispositivo" onchange="actualizarSensores()"></select>
                </div>
                <div class="col-md-3">
                  <label for="selectorSensor" class="form-label text-muted">Sensor</label>
                  <select class="form-select" id="selectorSensor" onchange="actualizarMedidas()"></select>
                </div>
                <div class="col-md-3">
                  <label for="selectorMedida" class="form-label text-muted">Tipo de Medida</label>
                  <select class="form-select" id="selectorMedida" onchange="procesarYGraficar()"></select>
                </div>
                <div class="col-md-3">
                  <label for="fechaFiltro" class="form-label text-muted">Filtrar por Fecha</label>
                  <input type="date" class="form-control" id="fechaFiltro" onchange="procesarYGraficar()" />
                </div>
              </div>
            </div>
          </div>

          <div class="row" id="contenedor-graficas-dinamico">
             </div>

        </section>

      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
